name: Release

# Creates the GitHub release with cryptographic artifact attestations
# whenever a bare-version tag (e.g. 1.4.1) is pushed. Users can verify
# provenance with: gh attestation verify main.js -R estrenuo/vault-companion-for-claude

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches manifest version
        run: |
          node -e "
            const m = require('./manifest.json');
            if (m.version !== process.env.GITHUB_REF_NAME)
              throw new Error('tag ' + process.env.GITHUB_REF_NAME + ' does not match manifest version ' + m.version);
          "

      - name: Attest build provenance of release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create GitHub release with assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" main.js manifest.json styles.css \
            --title "$GITHUB_REF_NAME" \
            --notes "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md) for details."
